# nginx reverse-proxy config for hbbc-fanclub.de
#
# The app (npm start) serves BOTH the built frontend (dist/) and the
# /api/* backend from one Express process on 127.0.0.1:3001 — this file
# just forwards everything to it. No separate static-file serving here;
# Express already handles that in production mode (see server/index.ts).
#
# Install: copy to /etc/nginx/sites-available/hbbc-fanclub.de, then
#   sudo ln -s /etc/nginx/sites-available/hbbc-fanclub.de /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then run certbot (see deploy/README.md) — it rewrites this file in place
# to add the HTTPS server block and HTTP->HTTPS redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name hbbc-fanclub.de www.hbbc-fanclub.de;

    # Matches the larger of the two multer limits (server/uploads.ts:
    # 8MB for images, 20MB for download PDFs) with headroom, so nginx
    # doesn't reject an upload before it reaches the app.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
